name: Build Windows Installers

on:
  push:
    branches: [main, master]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to create or update a release for (e.g. v0.1.0). Leave empty to skip releasing."
        required: false
        default: ""

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: main
            demo: false
          - app: admin
            demo: false
          - app: main
            demo: true
          - app: admin
            demo: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build real Tauri app
        if: ${{ !matrix.demo }}
        run: npm run tauri:build:${{ matrix.app }}

      - name: Build demo Tauri app (no backend required)
        if: ${{ matrix.demo }}
        run: npm run tauri:build:demo:${{ matrix.app }}

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: OAGF-Pension-${{ matrix.app == 'main' && 'Staff' || 'Admin' }}${{ matrix.demo && '-Demo' || '' }}-MSI
          path: target/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Upload NSIS installer (exe)
        uses: actions/upload-artifact@v4
        with:
          name: OAGF-Pension-${{ matrix.app == 'main' && 'Staff' || 'Admin' }}${{ matrix.demo && '-Demo' || '' }}-Setup
          path: target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Upload portable executable
        uses: actions/upload-artifact@v4
        with:
          name: OAGF-Pension-${{ matrix.app == 'main' && 'Staff' || 'Admin' }}${{ matrix.demo && '-Demo' || '' }}-Portable
          path: target/release/bundle/portable/*.exe
          if-no-files-found: ignore

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/v') || github.event.inputs.release_tag != '' }}

    steps:
      - name: Determine release tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            echo "value=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-assets
          pattern: OAGF-Pension-*

      - name: Flatten artifact directories for release upload
        shell: bash
        run: |
          mkdir -p ./upload-assets
          find ./release-assets -type f \( -name '*.msi' -o -name '*.exe' \) -exec cp {} ./upload-assets/ \;
          ls -la ./upload-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: OAGF SEVERANCE ${{ steps.tag.outputs.value }}
          files: ./upload-assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
